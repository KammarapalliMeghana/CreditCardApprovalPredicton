<!DOCTYPE html>
<html>
<head>
    <title>Credit Card Approval Prediction</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="container">

    <h1>Credit Card Approval Prediction</h1>

    <form action="/predict" method="POST">

        <div class="row">

            <div class="input-box">
                <label>Gender</label>
                <select name="gender">
                    <option value="1">Male</option>
                    <option value="0">Female</option>
                </select>
            </div>

            <div class="input-box">
                <label>Own Car</label>
                <select name="own_car">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="input-box">
                <label>Own Real Estate</label>
                <select name="own_realty">
                    <option value="1">Yes</option>
                    <option value="0">No</option>
                </select>
            </div>

            <div class="input-box">
                <label>Annual Income</label>
                <input type="number"
                       name="annual_income"
                       placeholder="Enter Income"
                       required>
            </div>

            <div class="input-box">
                <label>Income Type</label>
                <select name="income_type">
                    <option value="2">Working</option>
                    <option value="0">Commercial Associate</option>
                    <option value="1">Pensioner</option>
                </select>
            </div>

            <div class="input-box">
                <label>Education</label>
                <select name="education">
                    <option value="0">Secondary</option>
                    <option value="1">Graduate</option>
                    <option value="2">Post Graduate</option>
                </select>
            </div>

            <div class="input-box">
                <label>Family Status</label>
                <select name="family_status">
                    <option value="0">Single</option>
                    <option value="1">Married</option>
                    <option value="2">Divorced</option>
                </select>
            </div>

            <div class="input-box">
                <label>Housing Type</label>
                <select name="housing_type">
                    <option value="0">House</option>
                    <option value="1">Apartment</option>
                    <option value="2">Rented</option>
                </select>
            </div>

            <div class="input-box">
                <label>Family Members</label>
                <input type="number"
                       name="family_members"
                       min="1"
                       max="10"
                       required>
            </div>

            <div class="input-box">
                <label>Number of Loans</label>
                <input type="number"
                       name="number_of_loans"
                       min="0"
                       max="10"
                       required>
            </div>

        </div>

        <button type="submit">
            Predict
        </button>

    </form>

</div>

</body>
</html>
