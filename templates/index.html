<!DOCTYPE html>
<html>
<head>
    <title>Credit Card Approval Prediction</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Credit Card Approval Prediction System</h1>

<form action="/predict" method="post">

    <label>Gender</label>
    <select name="gender">
        <option value="1">Male</option>
        <option value="0">Female</option>
    </select>

    <br><br>

    <label>Income Type</label>
    <select name="income_type">
        <option value="0">Working</option>
        <option value="1">Commercial Associate</option>
        <option value="2">Pensioner</option>
    </select>

    <br><br>

    <label>Annual Income</label>
    <input type="number"
           name="annual_income"
           required>

    <br><br>

    <label>Employment Years</label>
    <input type="number"
           name="employment_years"
           required>

    <br><br>

    <label>Education</label>
    <select name="education">
        <option value="0">Secondary</option>
        <option value="1">Graduate</option>
        <option value="2">Post Graduate</option>
    </select>

    <br><br>

    <button type="submit">
        Predict
    </button>

</form>

</body>
</html>
